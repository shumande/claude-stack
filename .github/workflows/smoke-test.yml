name: smoke-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 06:00 UTC — catches dependency drift
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate .mcp.json
        run: |
          python3 -c "import json; json.load(open('.mcp.json'))"
          ! grep -E '"latest"|"\*"|@latest' .mcp.json

      - name: Validate settings.example.json
        run: python3 -c "import json; json.load(open('settings.example.json'))"

      - name: Run smoke-test (http-only servers, no .env)
        run: |
          chmod +x scripts/smoke-test.sh
          # http servers without credentials should still respond to initialize handshake
          # stdio servers will fail without env vars — acceptable in CI without secrets
          bash scripts/smoke-test.sh || true

      - name: Verify scripts are executable
        run: |
          test -x scripts/smoke-test.sh
          test -x scripts/install.sh
